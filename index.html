<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>wid's dashboard</title>
</head>

<body>
    <div class="dashboard">
        <div class="hero">
            <div class="header">
                <h1>wid's dashboard</h1>
                <div class="header-right">
                    <div class="mini-pomodoro" title="Pomodoro focus timer">
                        <span class="mini-phase" id="pomodoro-phase">Focus</span>
                        <span class="mini-time" id="pomodoro-time">25:00</span>
                        <button id="pomodoro-toggle">Start</button>
                        <button id="pomodoro-reset">Reset</button>
                    </div>
                    <h2 id="current-time">current time</h2>
                </div>
            </div>
        </div>
        <section class="links">
            <div class="logo-container bookmark">
                <!-- Bookmarks are rendered by script.js (data-driven, editable). -->
                <div class="grouped-logo" id="bookmark-grid">
                    <a href="#" class="logo logo-add" id="add-bookmark" title="Add a bookmark">
                        <span class="add-plus">+</span>
                    </a>
                </div>
            </div>
        </section>
        
        <!-- Crypto + Markets side by side -->
        <div class="finance-row">
        <!-- Crypto Price Tracker -->
        <section class="crypto-tracker">
            <h2>Cryptocurrency Prices</h2>
            <div class="crypto-container">
                <div class="crypto-card" id="bitcoin-card">
                    <img src="https://www.google.com/s2/favicons?domain=bitcoin.org&sz=128" alt="Bitcoin" loading="lazy">
                    <div class="crypto-info">
                        <h3>Bitcoin (BTC)</h3>
                        <p class="price">$<span id="btc-price">Loading...</span></p>
                        <p class="change"><span id="btc-change">Loading...</span></p>
                    </div>
                </div>
                <div class="crypto-card" id="ethereum-card">
                    <img src="https://www.google.com/s2/favicons?domain=ethereum.org&sz=128" alt="Ethereum" loading="lazy">
                    <div class="crypto-info">
                        <h3>Ethereum (ETH)</h3>
                        <p class="price">$<span id="eth-price">Loading...</span></p>
                        <p class="change"><span id="eth-change">Loading...</span></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Markets: IHSG + USD/IDR (below crypto) -->
        <section class="markets-section">
            <h2>Markets</h2>
            <div class="markets-inner">
                <div class="market-row">
                    <span class="market-name">IHSG</span>
                    <span class="market-values">
                        <span class="market-price" id="ihsg-price">Loading...</span>
                        <span class="change" id="ihsg-change"></span>
                    </span>
                </div>
                <p class="market-asof" id="ihsg-asof"></p>
                <div class="market-row">
                    <span class="market-name">USD / IDR</span>
                    <span class="market-values">
                        <span class="market-price" id="usdidr-price">Loading...</span>
                    </span>
                </div>
                <p class="market-asof" id="usdidr-asof"></p>
            </div>
        </section>
        </div>

        <!-- Google-like Search Section -->
        <section class="search-section">
            <div class="search-container">
                <div class="search-box">
                    <div class="search-input-container">
                        <i class="search-icon">🔍</i>
                        <input type="text" id="search-input" placeholder="Search Google or type a URL">
                        <i class="mic-icon">🎤</i>
                    </div>
                </div>
            </div>
        </section>

        <!-- Below search: Market Pulse + Market News side by side -->
        <div class="tools-wrapper">
            <!-- Market Pulse: live snapshot from free sources -->
            <section class="tool-section pulse-section">
                <h2>Market Pulse</h2>
                <ul class="pulse-list" id="pulse-list">
                    <li class="pulse-loading">Loading market data&hellip;</li>
                </ul>
                <p class="pulse-asof" id="pulse-asof"></p>
            </section>

            <!-- Market News: Indonesian + global finance headlines -->
            <section class="tool-section news-section">
                <h2>Market News</h2>
                <ul class="news-list" id="news-list">
                    <li class="news-loading">Loading headlines&hellip;</li>
                </ul>
                <p class="news-asof" id="news-asof"></p>
            </section>
        </div>
    </div>

    <!-- Include your JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
